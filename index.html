  .card{

  .avatar{
    width:96px;height:96px;

    font-size:28px;font-weight:600;letter-spacing:-0.02em;color:#fff;
    margin-bottom:6px;mix-blend-mode:overlay;
    animation:fadeUp .8s .15s cubic-bezier(0.22,1,0.36,1) both;

  .handle{
    font-family:"Space Mono",monospace;font-size:12px;color:var(--text-subtle);
    letter-spacing:0.08em;text-transform:lowercase;margin-bottom:14px;
    animation:fadeUp .8s .25s cubic-bezier(0.22,1,0.36,1) both;
  }
  .bio{
    font-size:14px;line-height:1.55;color:var(--text-muted);
    max-width:340px;margin:0 auto 28px;
    animation:fadeUp .8s .35s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* === Links === */
  .links{
    display:flex;flex-direction:column;gap:10px;
  }
  .link{
    display:flex;align-items:center;gap:14px;
    padding:14px 18px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    color:var(--text);
    text-decoration:none;
    font-size:15px;font-weight:500;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:transform .2s cubic-bezier(0.22,1,0.36,1),background .2s,border-color .2s;
    opacity:0;animation:fadeUp .6s cubic-bezier(0.22,1,0.36,1) both;
  }
  .link:hover{
    background:var(--card-hover);
    border-color:var(--border-hover);
    transform:translateY(-1px);
  }
  .link .icon{
    width:24px;height:24px;display:grid;place-items:center;
    flex-shrink:0;color:#fff;opacity:.85;
  }
  .link .label{
    flex:1;text-align:left;
  }
  .link .handle-line{
    font-family:"Space Mono",monospace;font-size:11px;color:var(--text-subtle);
    margin-top:2px;letter-spacing:-0.01em;
  }
  .link .arrow{
    color:var(--text-subtle);font-size:14px;opacity:0;
    transition:opacity .2s,transform .2s cubic-bezier(0.22,1,0.36,1);
  }
  .link:hover .arrow{opacity:1;transform:translateX(2px)}

  /* === Footer === */
  footer{
    margin-top:36px;text-align:center;
    font-family:"Space Mono",monospace;font-size:10px;
    letter-spacing:0.1em;text-transform:uppercase;
    color:var(--text-subtle);
    animation:fadeUp .8s .9s cubic-bezier(0.22,1,0.36,1) both;
  }
  footer a{color:var(--text-muted);text-decoration:none;border-bottom:1px solid var(--border)}
  footer a:hover{color:#fff;border-color:#fff}

  @keyframes blurIn{from{opacity:0;filter:blur(16px);transform:scale(.9)}to{opacity:1;filter:blur(0);transform:scale(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

vec3 okLch(vec3 lab){return vec3(lab.x,length(lab.yz),atan(lab.z,lab.y));}vec3 lchOk(vec3 l){return vec3(l.x,l.y*cos(l.z),l.y*sin(l.z));}
vec3 mLch(vec3 a,vec3 b,float t){vec3 la=okLch(a),lb=okLch(b);if(la.y<0.05)la.z=lb.z;if(lb.y<0.05)lb.z=la.z;float dh=lb.z-la.z;if(dh>3.14159265)dh-=TAU;if(dh<-3.14159265)dh+=TAU;return lchOk(vec3(mix(la.x,lb.x,t),mix(la.y,lb.y,t),la.z+dh*t));}
vec3 gC(int i){if(u_colors_length<1)return vec3(0.0);int k=clamp(i,0,u_colors_length-1);return u_colors[k].rgb;}
vec3 pN(float t,int n){if(n<1)return vec3(0.0);if(n<2)return tL(gC(0));float seg=1.0/float(n-1);t=clamp(t,0.0,1.0);int idx=min(int(floor(t/seg)),n-2);float lt=clamp((t-float(idx)*seg)/seg,0.0,1.0);vec3 a=lOk(tL(gC(idx)));vec3 b=lOk(tL(gC(idx+1)));return okL(mLch(a,b,lt));}
float IGN(vec2 uv){return fract(52.9829189*fract(dot(uv,vec2(0.06711056,0.00583715))));}
float qN(vec2 I){return fract(sin(dot(I,vec2(12.9898,78.233)))*43758.5453);}
float gD(vec2 I,float m){if(m<0.5)return 0.5;if(m<1.5)return IGN(I);return qN(I);}
vec3 sGM(vec3 rgb){float mx=max(rgb.r,max(rgb.g,rgb.b)),mn=min(rgb.r,min(rgb.g,rgb.b));if(mn>=0.0&&mx<=1.0)return rgb;vec3 lab=lOk(max(rgb,0.0));float L=clamp(lab.x,0.0,1.0),C=length(lab.yz),h=atan(lab.z,lab.y);float mc=0.4*(1.0-pow(abs(2.0*L-1.0),2.0));if(C>mc*0.7){float k=mc*0.7;C=k+(mc-k)*tanh((C-k)/(mc-k+0.001));}return clamp(okL(vec3(L,C*cos(h),C*sin(h))),0.0,1.0);}
vec3 aCS(vec3 rgb,float c,float s){vec3 lab=lOk(rgb);float C=length(lab.yz),h=atan(lab.z,lab.y);lab.x=clamp((lab.x-0.5)*c+0.5,0.0,1.0);C*=s;lab.y=C*cos(h);lab.z=C*sin(h);return okL(lab);}
void main(){vec2 fc=v_uv*u_resolution;vec2 r=u_resolution;vec2 p=(fc*2.0-r)/r.y;int n=u_colors_length;if(n<1){fragColor=vec4(0.0,0.0,0.0,1.0);return;}float t=u_time*0.3;float lp=step(0.5,u_loop);float ph=TAU*u_time/max(u_loop,0.01);float rd=u_loop*u_speed*0.3/TAU;float tA=sin(ph)*rd;float tB=(1.0-cos(ph))*rd;vec3 so=sR(u_seed);vec3 so2=sR(u_seed+100.0);float sa=u_seed*GA;vec2 sp=(so2.xy-0.5)*TAU;float cs=cos(sa),sn=sin(sa);p=mat2(cs,-sn,sn,cs)*p;float di=gD(floor(fc/u_pixelRatio),u_ditherMode);float tv=0.0,tw=0.0;int ti=int(u_turbIter);float fq=1.0/max(u_turbFreq,0.01);for(float i=0.0;i<4.0;i++){float e=i/4.0;vec2 q=p*u_scale;float sq=e*e;if(u_jellify>0.5){q.yx*=mix(1.0,0.5,1.0-exp(-sq));}float a=sp.x;float d=sp.y;for(int j=2;j<13;j++){if(j>=ti)break;float fj=float(j);float t1=mix(t*u_speed,tA,lp);float t2=mix(t*u_speed,tB,lp);q+=u_turbAmp*sin(q.yx/fq*fj+t1+vec2(a,d)+so.xy*fj)/fj;a+=cos(fj+d*1.2+q.x*2.0-t1+so2.z+t2*0.3*lp);d+=sin(fj*q.y+a+so.z+t1+so2.y+t2*0.3*lp);}float v=0.5+0.5*sin(length(q.yx+vec2(a,d)*0.2)*u_waveFreq+i*i+so.x);float w=smoothstep(0.0,0.5,e)*smoothstep(1.0,0.5,e);tv+=v*w;tw+=w;}float val=tv/tw;val=clamp((val-0.3)/0.4,0.0,1.0);val=pow(val,exp(-u_distBias));val=clamp(val+(di-0.5)*u_dither,0.0,1.0);vec3 col=pN(val,n);col*=u_exposure;col=aCS(col,u_contrast,u_saturation);col=sGM(col);col=tS(col);fragColor=vec4(col,1.0);}`;

function compile(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));throw 0;}return sh;}
const prog=gl.createProgram();gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
const U={};['colors','colors_length','resolution','time','pixelRatio','seed','speed','scale','turbAmp','turbFreq','turbIter','waveFreq','jellify','distBias','dither','ditherMode','exposure','contrast','saturation','loop'].forEach(n=>U[n]=gl.getUniformLocation(prog,'u_'+n));
function hexToRgba(h){const v=parseInt(h.slice(1),16);return [(v>>16&255)/255,(v>>8&255)/255,(v&255)/255,1];}
const flat=[]; for(const h of CONFIG.colors) flat.push(...hexToRgba(h)); while(flat.length<32) flat.push(0,0,0,1);
gl.uniform4fv(U.colors,new Float32Array(flat)); gl.uniform1i(U.colors_length,CONFIG.colors.length);
function resize(){const dpr=Math.min(window.devicePixelRatio||1,2);canvas.width=Math.floor(innerWidth*dpr);canvas.height=Math.floor(innerHeight*dpr);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';gl.viewport(0,0,canvas.width,canvas.height);}
resize();addEventListener('resize',resize);
const t0=performance.now();
function frame(){const t=(performance.now()-t0)/1000;
  gl.uniform2f(U.resolution,canvas.width,canvas.height);gl.uniform1f(U.time,t);gl.uniform1f(U.pixelRatio,Math.min(window.devicePixelRatio||1,2));
  gl.uniform1f(U.seed,CONFIG.seed);gl.uniform1f(U.speed,CONFIG.speed);gl.uniform1f(U.scale,CONFIG.scale);
  gl.uniform1f(U.turbAmp,CONFIG.turbAmp);gl.uniform1f(U.turbFreq,CONFIG.turbFreq);gl.uniform1f(U.turbIter,CONFIG.turbIter);
  gl.uniform1f(U.waveFreq,CONFIG.waveFreq);gl.uniform1f(U.jellify,CONFIG.jellify);gl.uniform1f(U.distBias,CONFIG.distBias);
  gl.uniform1f(U.dither,CONFIG.dither);gl.uniform1f(U.ditherMode,CONFIG.ditherMode);gl.uniform1f(U.exposure,CONFIG.exposure);
  gl.uniform1f(U.contrast,CONFIG.contrast);gl.uniform1f(U.saturation,CONFIG.saturation);gl.uniform1f(U.loop,CONFIG.loop);
  gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(frame);}
frame();
}
